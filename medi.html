<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediRemind</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fce4ec; color: #333; padding: 20px; display: flex; justify-content: center; }
        .phone-mockup { background: white; width: 350px; height: 650px; border-radius: 35px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: 8px solid #333; padding: 20px; overflow-y: auto; }
        h2 { text-align: center; color: #d81b60; border-bottom: 2px solid #f8bbd0; padding-bottom: 10px; }
        .med-card { background: #f8bbd0; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .med-card h4 { margin: 0 0 5px 0; color: #880e4f; }
        .time { background: white; padding: 5px 10px; border-radius: 20px; font-weight: bold; color: #d81b60; font-size: 0.9rem; }
        .add-btn { width: 100%; background: #d81b60; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="phone-mockup">
        <h2>💊 MediRemind</h2>
        
        <div class="med-card">
            <div>
                <h4>Amoxicillin</h4>
                <small>1 Pill - After Food</small>
            </div>
            <div class="time">08:00 AM</div>
        </div>

        <div class="med-card">
            <div>
                <h4>Vitamin D3</h4>
                <small>1 Capsule</small>
            </div>
            <div class="time">12:30 PM</div>
        </div>

        <div class="med-card" style="background: #e0e0e0;">
            <div>
                <h4 style="color: #555;">Paracetamol</h4>
                <small>Taken ✔️</small>
            </div>
            <div class="time" style="color: #555;">06:00 AM</div>
        </div>

        <button class="add-btn" onclick="alert('Scheduling feature opens device native notifications!')">+ Add New Medication</button>
    </div>
</body>
</html>
