<!DOCTYPE html>
<html>
<head>
    <title>MediRemind Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f5; padding: 20px; }
        .app-container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .med-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .add-area { margin-top: 20px; padding-top: 20px; border-top: 2px solid #ffccd5; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        button { background: #d63384; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>💊 MediRemind Pro</h2>
        <div id="med-list">
            <div class="med-item"><span>Amoxicillin</span> <span>08:00 AM</span></div>
            <div class="med-item"><span>Paracetamol</span> <span>02:00 PM</span></div>
        </div>
        <div class="add-area">
            <h4>Add New Medication</h4>
            <input type="text" id="medName" placeholder="Medicine Name">
            <input type="time" id="medTime">
            <button onclick="addMed()">Schedule Reminder</button>
        </div>
    </div>
    <script>
        function addMed() {
            const name = document.getElementById('medName').value;
            const time = document.getElementById('medTime').value;
            if(name && time) {
                const list = document.getElementById('med-list');
                list.innerHTML += `<div class="med-item"><span>${name}</span> <span>${time}</span></div>`;
            }
        }
    </script>
</body>
</html>
